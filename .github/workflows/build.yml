name: Redmi 10A LineageOS Derleyici

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Depolama Alanını Temizle
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Gerekli Paketlerin Kurulması
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc ccache libncurses5-dev bison flex libssl-dev libelf-dev python3-pip zip subversion
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Git Ayarlarını Yap
      run: |
        git config --global user.name "Efelowlevelhehe Builder"
        git config --global user.email "rvn@example.com"

    - name: LineageOS Kaynak Kodlarını İndir ve Cihaz Ağaçlarını Klonla
      run: |
        # Şifre sorma hatalarını engellemek için tokenı sisteme gömüyoruz
        git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

        mkdir android
        cd android
        
        # Ana ROM tabanını initialize et
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --depth=1
        
        # Ana ROM kodlarını indir
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        
        # Sürücüleri ve cihaz ağacını çekiyoruz
        git clone https://github.com/RDEV521/android_device_xiaomi_dandelion.git device/xiaomi/dandelion
        
        # KERNEL: linege-18.1 dalı (branch) kesin olan uyumlu repoyu çekiyoruz
        git clone https://github.com/RDEV521/android_kernel_xiaomi_mt6765.git -b lineage-18.1 kernel/xiaomi/dandelion
        
        # VENDOR: Şifre sormayan açık havuzdan çekiyoruz
        mkdir -p vendor/xiaomi
        svn export https://github.com/TheMuppets/proprietary_vendor_xiaomi/branches/lineage-18.1/dandelion vendor/xiaomi/dandelion

    - name: Derlemeyi Başlat
      run: |
        cd android
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 50G
        source build/envsetup.sh
        lunch lineage_dandelion-userdebug
        mka bacon -j$(nproc --all)

    - name: ROM Dosyasını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-Dandelion-Build
        path: android/out/target/product/dandelion/*.zip
